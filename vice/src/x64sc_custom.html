<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Emscripten-Generated Code</title>
    <style>
      {{{ SHELL_CSS }}}
    </style>
  </head>
  <body>
    <a href="http://emscripten.org">{{{ SHELL_LOGO }}}</a>

    <div class="spinner" id="spinner"></div>
    <div class="emscripten" id="status">Downloading...</div>

    <span id="controls">
      <span><input type="checkbox" id="resize" />Resize canvas</span>
      <span
        ><input type="checkbox" id="pointerLock" checked />Lock/hide mouse
        pointer &nbsp;&nbsp;&nbsp;</span
      >
      <span
        ><input
          type="button"
          value="Fullscreen"
          onclick="
            Module.requestFullscreen(
              document.getElementById('pointerLock').checked,
              document.getElementById('resize').checked,
            )
          "
      /></span>
    </span>

    <div class="emscripten">
      <progress value="0" max="100" id="progress" hidden="1"></progress>
    </div>

    <div class="emscripten_border">
      <canvas
        class="emscripten"
        id="canvas"
        oncontextmenu="event.preventDefault()"
        tabindex="0"
      ></canvas>
    </div>
    <textarea id="output" rows="8"></textarea>

    <script type="text/javascript">
      var statusElement = document.getElementById("status");
      var progressElement = document.getElementById("progress");
      var spinnerElement = document.getElementById("spinner");
      var canvasElement = document.getElementById("canvas");
      var outputElement = document.getElementById("output");
      if (outputElement) outputElement.value = "";

      canvasElement.addEventListener(
        "webglcontextlost",
        function (e) {
          alert("WebGL context lost. You will need to reload the page.");
          e.preventDefault();
        },
        false,
      );

      function focusCanvas() {
        if (document.activeElement !== canvasElement) {
          canvasElement.focus();
        }
      }

      window.addEventListener("load", focusCanvas);
      canvasElement.addEventListener("click", focusCanvas);

      var Module = {
        print: function () {
          var args = Array.prototype.slice.call(arguments);
          console.log.apply(console, args);
          if (outputElement) {
            var text = args.join(" ");
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight;
          }
        },
        canvas: canvasElement,
        setStatus: function (text) {
          if (!Module.setStatus.last) {
            Module.setStatus.last = { time: Date.now(), text: "" };
          }
          if (text === Module.setStatus.last.text) {
            return;
          }
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) {
            return;
          }
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2], 10) * 100;
            progressElement.max = parseInt(m[4], 10) * 100;
            progressElement.hidden = false;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) {
              spinnerElement.style.display = "none";
            }
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function (left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(
            left
              ? "Preparing... (" +
                  (this.totalDependencies - left) +
                  "/" +
                  this.totalDependencies +
                  ")"
              : "All downloads complete.",
          );
        },
      };

      Module.setStatus("Downloading...");
      window.onerror = function () {
        Module.setStatus("Exception thrown, see JavaScript console");
        spinnerElement.style.display = "none";
        Module.setStatus = function (text) {
          if (text) {
            console.error("[post-exception status] " + text);
          }
        };
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
